name: Bug Report
description: Report something broken in ShakeUp
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - iOS
        - Android
    validations:
      required: true
